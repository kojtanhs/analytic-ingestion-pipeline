name: 'analytic_ingestion_pipeline'
version: '1.0.0'
config-version: 2

profile: 'analytics'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]

models:
  analytic_ingestion_pipeline:
    # Capa Staging: Vistas ligeras e instantáneas para no duplicar costos de almacenamiento
    staging:
      +materialized: view
      +schema: staging
    # Capa Intermediate: Tablas eficientes transitorias
    intermediate:
      +materialized: table
      +schema: intermediate
    # Capa Marts: Tablas finales optimizadas y particionadas para consumo analítico de negocio o IA
    marts:
      +materialized: table
      +schema: analytics
